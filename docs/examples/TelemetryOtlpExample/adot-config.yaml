# ADOT Collector pipeline for the TelemetryOtlpExample.
#
# Receives OTLP traffic from the sample app on :4318 (HTTP) and :4317
# (gRPC), batches the spans, and exports them to AWS X-Ray.
#
# Credentials and region come from the standard AWS SDK chain inside the
# collector container; the docker-compose.yml for this example passes
# AWS_REGION and short-lived credentials in as environment variables.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:

exporters:
  awsxray:
    region: <region>

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [awsxray]

  telemetry:
    logs:
      level: info

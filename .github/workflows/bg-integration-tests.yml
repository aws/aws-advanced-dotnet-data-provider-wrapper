name: bg-integration-tests.yml

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.jpg'
      - '**/README.txt'
      - '**/LICENSE.txt'
      - 'docs/**'
      - 'ISSUE_TEMPLATE/**'
      - '**/remove-old-artifacts.yml'
  pull_request_target:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.jpg'
      - '**/README.txt'
      - '**/LICENSE.txt'
      - 'docs/**'
      - 'ISSUE_TEMPLATE/**'
      - '**/remove-old-artifacts.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  approve:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - run: echo "Approved — not a fork PR"

  approve-fork:
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    environment: integration-tests
    steps:
      - run: echo "Fork PR approved by maintainer"

  all-bg-integration-tests-latest:
    name: Run Blue/Green integration tests with latest engine version
    needs: [approve, approve-fork]
    if: |
      always() &&
      (needs.approve.result == 'success' || needs.approve-fork.result == 'success') &&
      !(needs.approve.result == 'failure' || needs.approve-fork.result == 'failure')
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        dbEngine: ["mysql", "pg"]
        deployment: ["aurora", "multi-az-cluster"]
    steps:
      - name: 'Clone repository'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: "Set up JDK 8"
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: 8
      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.407'
      - name: Configure AWS Credentials
        id: creds
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: dotnet_integration_test
          role-duration-seconds: 21600
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          output-credentials: true
      - name: Run Integration Tests
        run: |
          cd test/integration/host && ./gradlew --no-parallel --no-daemon test-bgd-${{ matrix.deployment }}-${{ matrix.dbEngine }} --info
        env:
          RDS_DB_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_ACCESS_KEY_ID: ${{ steps.creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.creds.outputs.aws-session-token }}
          MYSQL_VERSION: "default"
          PG_VERSION: "default"
      - name: Archive results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report-default-${{ matrix.dbEngine }}
          path: ./test/integration/container/reports
          retention-days: 5
      - name: Get Github Action IP
        if: always()
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT
      - name: Remove Github Action IP
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress --group-name default --protocol all --port 0-65535 --cidr ${{ steps.ip.outputs.ipv4 }}/32
